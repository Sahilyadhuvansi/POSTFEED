version: '3.8'

# ─── PRODUCTION STACK (Docker Swarm / Compose) ────────────────────────────────
# Features:
# - Orchestration: Backend API + Redis Shared Cache.
# - Health Checks: Ensures services are and stay alive.
# - Auto-Recovery: Respawns containers if they fail.
# ──────────────────────────────────────────────────────────────────────────────

services:
  # Fullstack API
  backend:
    build: 
      context: ./Backend
      dockerfile: Dockerfile
    container_name: postfeed-api
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://cache:6379
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      cache:
        condition: service_healthy

  # Redis Shared Cluster Cache (Shared Memory)
  cache:
    image: redis:alpine
    container_name: postfeed-cache
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
